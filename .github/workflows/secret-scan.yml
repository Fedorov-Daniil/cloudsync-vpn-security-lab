name: Sensitive Value Scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for risky markers
        shell: bash
        run: |
          set -euo pipefail

          patterns=(
            'BEGIN ''.*PRIVATE ''KEY'
            'pass''word'
            'to''ken'
            'sec''ret'
            'DATABASE''_URL'
            'DB''_URL'
            'api_''key'
            'bear''er'
            'cook''ie'
            'ses''sion'
          )

          joined="$(printf '%s\n' "${patterns[@]}" | paste -sd '|' -)"

          if grep -RInE \
            --exclude-dir=.git \
            --exclude='SECURITY.md' \
            "$joined" .; then
            echo "Sensitive value markers found."
            exit 1
          fi

          echo "No risky markers found outside approved policy files."
