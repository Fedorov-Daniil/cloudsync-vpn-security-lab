# CloudSync SafeOps example client DNS policy
# This is a sanitized portfolio sample. It is not a live production config.

[General]
dns-server = system
doh-server = https://doh.example.com/dns-query

[Rule]
# Local and private networks stay local.
IP-CIDR,10.0.0.0/8,DIRECT
IP-CIDR,172.16.0.0/12,DIRECT
IP-CIDR,192.168.0.0/16,DIRECT

# Example business services.
DOMAIN-SUFFIX,example.com,DIRECT
DOMAIN-SUFFIX,customer.example,DIRECT

# Final default behavior for this demo policy.
FINAL,DIRECT
